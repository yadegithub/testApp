<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Circuit electrique AR</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/loaders/GLTFLoader.js"></script>
    <script async src="https://docs.opencv.org/4.5.4/opencv.js"></script>
</head>
<body>
    <video id="videoInput" autoplay muted playsinline></video>
    <canvas id="canvasOutput"></canvas>
    <canvas id="canvasThree"></canvas>

    <div id="ui-layer">
        <div id="app-header">
            <span id="app-eyebrow">AR Learn live scan</span>
            <div id="app-title">CIRCUIT ELECTRIQUE</div>
        </div>

        <div id="status" class="solar-status glass">Initialisation...</div>

        <div id="organ-labels" aria-label="Labels des composants du circuit"></div>

        <div id="side-menu" class="glass">
            <button class="menu-btn active" id="btn-rotate" type="button">
                <span class="menu-icon">R</span>
                <span class="label">Rotate</span>
            </button>
            <button class="menu-btn" id="btn-scale" type="button">
                <span class="menu-icon">S</span>
                <span class="label">Scale</span>
            </button>
            <button class="menu-btn action-btn" id="btn-launch" type="button">
                <span class="menu-icon">&#9654;</span>
                <span class="label">Allumer</span>
            </button>
            <hr class="sep">
            <div class="toggle-box">
                <label class="switch">
                    <input type="checkbox" id="btn-labels" checked aria-pressed="true">
                    <span class="slider"></span>
                </label>
                <span class="label">Labels On/Off</span>
            </div>
        </div>

        <div id="info-card" class="glass info-card--visible">
            <div class="card-content">
                <div class="text-area">
                    <span class="card-tag" id="card-tag">MODELE PHYSIQUE</span>
                    <h3 id="part-name">Electric Circuit</h3>
                    <p id="part-info">
                        Observez une pile, des fils, une ampoule et un interrupteur dans un circuit electrique simple.
                    </p>
                    <span id="part-hint" class="card-hint">
                        Utilisez Rotate, Scale et Allumer pour explorer le modele.
                    </span>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
