<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Poumons humains AR</title>
    <link rel="stylesheet" href="style.css?v=20260504-1">
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/loaders/GLTFLoader.js"></script>
    <script async src="https://docs.opencv.org/4.5.4/opencv.js"></script>
</head>
<body>
    <video id="videoInput" autoplay muted playsinline style="display:none"></video>
    <canvas id="canvasOutput" style="position:absolute; top:0; left:0;"></canvas>
    <canvas id="canvasThree" style="position:absolute; top:0; left:0;"></canvas>

    <div id="ui-layer">
        <div id="app-header">
            <span id="app-eyebrow">AR Learn live scan</span>
            <div id="app-title">POUMONS HUMAINS</div>
        </div>

        <div id="status" class="solar-status glass">Initialisation...</div>

        <div id="side-menu" class="glass">
            <button class="menu-btn active" id="btn-rotate" type="button">
                <span class="menu-icon">R</span>
                <span class="label">Rotate</span>
            </button>
            <button class="menu-btn" id="btn-scale" type="button">
                <span class="menu-icon">S</span>
                <span class="label">Scale</span>
            </button>
            <hr class="sep">
            <button class="menu-btn action-btn" id="btn-launch" type="button">
                <span class="menu-icon">&#9654;</span>
                <span class="label">Respire</span>
            </button>
        </div>

        <div id="info-card" class="glass info-card--visible">
            <div class="card-content">
                <div class="text-area">
                    <span class="card-tag">MODELE BIOLOGIQUE</span>
                    <h3 id="part-name">Poumons humains</h3>
                    <p id="part-info">
                        Observez la trachee, les bronches et le volume pulmonaire dans un modele 3D place sur votre QR code.
                    </p>
                    <span id="part-hint" class="card-hint">
                        Utilisez Rotate, Scale et Respire pour explorer le modele.
                    </span>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js?v=20260504-2"></script>
</body>
</html>
